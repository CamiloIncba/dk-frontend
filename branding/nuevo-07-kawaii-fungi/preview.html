<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>N-07 — Kawaii Fungi | Stone Fungus Branding</title>
<style>
body { margin:0; background:#FFFFFF; color:#111111; font-family:system-ui,sans-serif; padding:1.5rem; }
h1 { font-size:1.35rem; margin-bottom:.25rem; }
.meta { color:#888; font-size:.85rem; margin-bottom:1rem; }
.palette { display:flex; gap:.5rem; margin-bottom:1.25rem; flex-wrap:wrap; }
.palette span { width:28px; height:28px; border-radius:4px; border:1px solid #ccc; }
.mascot { max-width:1024px; margin-bottom:1.5rem; }
.mascot img { width:100%; max-width:640px; display:block; border-radius:8px; background:#f0f0f0; }
.grid { display:grid; grid-template-columns:repeat(3,1fr); gap:1rem; max-width:900px; }
.cell img { width:100%; display:block; border-radius:8px; background:#f0f0f0; }
.label { text-align:center; font-size:.65rem; color:#666; margin-top:.35rem; text-transform:uppercase; letter-spacing:.06em; }
@media (max-width:700px) { .grid { grid-template-columns:1fr 1fr; } }
@media (max-width:480px) { .grid { grid-template-columns:1fr; } }
</style>
</head>
<body>
<h1>N-07 — Kawaii Fungi</h1>
<p class="meta">Personaje adorable · Palitos</p>
<div class="palette"><span style="background:#FFFFFF" title="#FFFFFF"></span><span style="background:#FFD43B" title="#FFD43B"></span><span style="background:#111111" title="#111111"></span></div>
<div class="mascot"><img src="mascot.png" alt="Mascota"><div class="label">mascot.png · 1024×1024</div></div>
<h2 style="font-size:1rem;color:#888;margin:1rem 0 .5rem;">Stickers (512×512)</h2>
<div class="grid">
<div class="cell"><img src="sticker-enoki.png" alt="enoki"><div class="label">sticker-enoki.png</div></div><div class="cell"><img src="sticker-ostra.png" alt="ostra"><div class="label">sticker-ostra.png</div></div><div class="cell"><img src="sticker-shiitake.png" alt="shiitake"><div class="label">sticker-shiitake.png</div></div><div class="cell"><img src="sticker-melena.png" alt="melena"><div class="label">sticker-melena.png</div></div><div class="cell"><img src="sticker-champignon.png" alt="champignon"><div class="label">sticker-champignon.png</div></div><div class="cell"><img src="sticker-porcina.png" alt="porcina"><div class="label">sticker-porcina.png</div></div><div class="cell"><img src="sticker-carnita.png" alt="carnita"><div class="label">sticker-carnita.png</div></div><div class="cell"><img src="sticker-veggie.png" alt="veggie"><div class="label">sticker-veggie.png</div></div><div class="cell"><img src="sticker-napolitana.png" alt="napolitana"><div class="label">sticker-napolitana.png</div></div>
</div>
</body>
</html>
