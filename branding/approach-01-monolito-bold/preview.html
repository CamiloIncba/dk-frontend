<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Enfoque 1 — Monolito Bold | Stone Fungus Branding</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #0A0A0A; color: #FAFAFA; font-family: 'Segoe UI', system-ui, sans-serif; padding: 2rem; }
  h1 { font-size: 2rem; text-align: center; margin-bottom: .25rem; }
  .subtitle { text-align: center; color: #C9A96E; margin-bottom: .5rem; font-size: 1rem; }
  .palette { display: flex; justify-content: center; gap: .75rem; margin-bottom: 2rem; }
  .swatch { width: 32px; height: 32px; border-radius: 4px; border: 1px solid #333; }
  .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 2rem; max-width: 960px; margin: 0 auto; }
  .card { background: #141414; border-radius: 8px; overflow: hidden; }
  .card img { width: 100%; display: block; }
  .card p { text-align: center; padding: .75rem; font-size: .875rem; color: #999; text-transform: uppercase; letter-spacing: .1em; }
  .version-label { text-align: center; font-size: 1.25rem; margin: 2.5rem 0 1rem; text-transform: uppercase; letter-spacing: .15em; opacity: .5; }
  @media (max-width: 600px) { .grid { grid-template-columns: 1fr; } }
</style>
</head>
<body>
  <h1>01 — Monolito Bold</h1>
  <p class="subtitle">Premium-minimal · Millennials urbanos</p>
  <div class="palette">
    <div class="swatch" style="background:#0A0A0A" title="#0A0A0A"></div>
    <div class="swatch" style="background:#FAFAFA" title="#FAFAFA"></div>
    <div class="swatch" style="background:#C9A96E" title="#C9A96E"></div>
  </div>
  <div class="grid">
    <div class="card"><img src="logo.png" alt="Logo"><p>Logo</p></div>
    <div class="card"><img src="typography.png" alt="Tipografía"><p>Tipografía</p></div>
    <div class="card"><img src="mascot.png" alt="Mascota"><p>Mascota</p></div>
    <div class="card"><img src="pizza-box.png" alt="Caja de Pizza"><p>Caja de Pizza</p></div>
  </div>
  <h2 class="version-label">v2 — Con Referencias</h2>
  <div class="grid">
    <div class="card"><img src="logo-v2.png" alt="Logo v2"><p>Logo v2</p></div>
    <div class="card"><img src="typography-v2.png" alt="Tipografía v2"><p>Tipografía v2</p></div>
    <div class="card"><img src="mascot-v2.png" alt="Mascota v2"><p>Mascota v2</p></div>
    <div class="card"><img src="pizza-box-v2.png" alt="Caja de Pizza v2"><p>Caja de Pizza v2</p></div>
  </div>
</body>
</html>
